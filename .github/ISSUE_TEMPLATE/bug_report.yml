name: Bug report
description: Something in Weft is broken or behaves unexpectedly.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. The more specific you are, the faster we can fix it.
        If this is a security issue, do NOT file it here. Email contact@weavemind.ai instead.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
      placeholder: When I wire a List[String] into an LlmInference prompt port, the compiler reports the wrong type...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: What should have happened instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps so we can see the bug on our side. A tiny Weft project that triggers it is ideal.
      placeholder: |
        1. Create a new project with these two nodes...
        2. Wire X to Y...
        3. Click Run...
      render: markdown
    validations:
      required: true

  - type: textarea
    id: weft-code
    attributes:
      label: Weft code (if applicable)
      description: Paste the minimal Weft project that reproduces the bug.
      render: weft

  - type: textarea
    id: logs
    attributes:
      label: Logs or error messages
      description: Relevant output from the dashboard, the backend, or the browser console.
      render: shell

  - type: input
    id: version
    attributes:
      label: Weft version / commit
      description: Run `git rev-parse HEAD` in the weft directory, or paste the release version.
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux
        - macOS
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Screenshots, hunches, related issues, anything else that might help.
