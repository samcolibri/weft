name: Feature request
description: Suggest a new capability, a language change, or an improvement to the dashboard.
labels: ["feature", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening this, skim [DESIGN.md](https://github.com/WeaveMindAI/weft/blob/main/DESIGN.md) and the [roadmap](https://github.com/WeaveMindAI/weft/blob/main/ROADMAP.md). Weft is opinionated, and some kinds of changes will not land no matter how good the PR is. That is not a bad thing, it is just scope management.

        If you want a new **node** (not a language change), use the "Node request" template instead.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation. What are you building, what gets in the way, what would the ideal fix look like?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you would like to see. Syntax, behavior, UI, whatever applies. Be as concrete as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
      description: Things you tried or thought about that did not work.

  - type: textarea
    id: design-fit
    attributes:
      label: How does this fit the design principles?
      description: Point to the principle(s) in DESIGN.md that this supports or tensions with. If it breaks one, explain why the tradeoff is worth it.

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I have read DESIGN.md and ROADMAP.md.
          required: true
        - label: I have searched existing issues for duplicates.
          required: true
